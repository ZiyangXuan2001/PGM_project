dataset:
  name: diving48_v2
  num_classes: 48

model:
  ablation_id: E4
  variant: diff_pgm_info_attention

backbone:
  name: precomputed_resnet50
  input_dim: 2048
  num_frames: 16

diff_nn:
  type: pairwise_diff_net
  d_y: 128
  hidden_dim: 256
  dropout: 0.1

pgm_smoother:
  type: gaussian_chain
  lambda_smooth: 1.0

information_matrix:
  enabled: true
  type: accumulator
  K: 8
  d_h: 128
  use_alpha: true
  eta: 1.0

classifier:
  type: attention_pool
  hidden_dim: 256
  dropout: 0.2
  num_heads: 4

training:
  batch_size: 64
  lr: 1e-4
  weight_decay: 1e-4
  epochs: 30
  device: auto
  seed: 0
  save_best: true

logging:
  use_wandb: false
  wandb_project: diving48-diff-pgm-info
